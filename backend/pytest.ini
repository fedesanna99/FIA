[pytest]
testpaths = tests
python_files = test_*.py
# Nota: il coverage è raccolto sempre (utile in dev) ma il GATE (`--cov-fail-under`)
# è applicato solo dalla CI per evitare falsi negativi con `--collect-only`,
# `-k <pattern>`, ecc.
addopts = -v --tb=short --cov=core --cov-report=term
filterwarnings =
    ignore::DeprecationWarning
markers =
    network: tests that hit external APIs (opt-in)
    ai_live: tests that call real AI providers (opt-in)
    benchmark: NAFEMS or analytical benchmarks
    slow: long-running tests
