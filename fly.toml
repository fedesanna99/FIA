# Fly.io configuration — FEA Pro (single-image, Option A)
# After `fly launch --no-deploy` rename the app field below if needed.

app = "fea-pro"
primary_region = "fra"      # Frankfurt — closest to IT
kill_signal     = "SIGINT"
kill_timeout    = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  FEAPRO_DATA_DIR = "/data"
  # Fallback chain F8: ogni dominio prova primary -> fallback su
  # NotImplementedError/5xx/timeout/rate_limit (vedi services/orchestrator.py).
  # Senza questo, /api/loads/meteo chiama solo open_meteo_forecast che NON
  # implementa historical_extremes -> 503 AllProvidersFailedError.
  FEAPRO_METEO_FALLBACK = "open_meteo_archive"
  FEAPRO_GEOCODING_FALLBACK = "nominatim"
  FEAPRO_ELEVATION_FALLBACK = "usgs_elevation"
  # PYTHONUNBUFFERED is already set in the Dockerfile

# Persistent JSON storage for models (survives restarts/deploys).
# Create once:  fly volumes create fea_data --region fra --size 1
[mounts]
  source      = "fea_data"
  destination = "/data"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true     # sleep when idle (cold-start ~1-2s)
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  # WebSocket-friendly: long-lived connections + no aggressive idle timeout
  [http_service.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    timeout       = "5s"
    path          = "/api/health"

# Right-size for SciPy: 256MB is too tight, 1GB gives modal/dynamic headroom.
[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "1gb"
