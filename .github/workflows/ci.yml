name: CI

# v2.3.2: triggera anche su feature/** e test cosi' vediamo CI prima del
# merge in main. Cancella run vecchi quando il branch riceve nuovi push.
on:
  push:
    branches: [main, master, test, "feature/**"]
  pull_request:
    branches: [main, master, test]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install system libs for gmsh / OpenGL
        # gmsh (mesh kernel) richiede libGLU + libGL anche su runner
        # headless: senza queste librerie tutti gli import falliscono con
        # OSError libGLU.so.1 (v2.3.2 CI fix).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglu1-mesa libgl1 libxrender1 libxcursor1 libxft2 libxinerama1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        # Escludi i marker opt-in (network, ai_live, calibration) e i
        # long-running (slow). Questi test integration contro API esterne
        # (USGS, Open-Meteo, ecc.) sono flaky su runner CI senza network
        # garantito. Resta comunque possibile lanciarli con
        # `pytest -m slow` in locale.
        run: pytest --tb=short --cov-fail-under=70 -m "not slow and not network and not ai_live and not calibration"

  frontend-build:
    name: Frontend (typecheck + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (npm ci)
        run: npm ci --no-audit --no-fund
      - name: TypeScript typecheck (tsc -b)
        run: npx tsc -b --pretty false
      - name: Vitest unit tests
        run: npm test
      - name: Build (Vite)
        run: npm run build
