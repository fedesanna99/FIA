name: CI

# v2.3.2: triggera anche su feature/** e test cosi' vediamo CI prima del
# merge in main. Cancella run vecchi quando il branch riceve nuovi push.
on:
  push:
    branches: [main, master, test, "feature/**"]
  pull_request:
    branches: [main, master, test]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest --tb=short --cov-fail-under=70

  frontend-build:
    name: Frontend (typecheck + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (npm ci)
        run: npm ci --no-audit --no-fund
      - name: TypeScript typecheck (tsc -b)
        run: npx tsc -b --pretty false
      - name: Vitest unit tests
        run: npm test
      - name: Build (Vite)
        run: npm run build
